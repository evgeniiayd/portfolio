<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Мое Портфолио</title>
    <style>
        :root {
            --primary-color: #ec4899; /* Яркий розовый */
            --primary-hover: #be185d; /* Темно-розовый для наведения */
            --bg-color: #fdf2f8;      /* Очень бледный розовый фон */
            --card-bg: #ffffff;       /* Белый цвет карточек */
            --text-main: #1e293b;     /* Темный текст */
            --text-secondary: #64748b; /* Серый текст */
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }


        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Navigation / Breadcrumbs */
        .nav-bar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .back-btn:hover {
            background-color: #eff6ff;
        }

        .back-btn.hidden {
            display: none;
        }

        .breadcrumb {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            margin-bottom: 2rem;
            font-size: 1.8rem;
            color: var(--text-main);
            border-left: 5px solid var(--primary-color);
            padding-left: 1rem;
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Cards (Modules & Disciplines) */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Assignments List */
        .assignment-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .assignment-item {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .assignment-btn {
            width: 100%;
            padding: 1.2rem;
            background: none;
            border: none;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .assignment-btn:hover {
            background-color: #f1f5f9;
        }

        .assignment-btn::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--primary-color);
            transition: transform 0.3s;
        }

        .assignment-item.active .assignment-btn::after {
            transform: rotate(45deg);
        }

        .assignment-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .assignment-inner {
            padding: 1.5rem;
        }

        .assignment-text {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .file-link:hover {
            background-color: var(--primary-hover);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
            .nav-bar { padding: 1rem; }
        }
    </style>
</head>

            const module = portfolioData.find(m => m.id === moduleId);

            currentView = 'module';
            currentModuleId = moduleId;
            updateNav(module.title);

            let html = `<h2 class="section-title">${module.title}</h2><div class="grid">`;

                        <p>${disc.assignments.length} заданий</p>

            html += `</div>`;
            app.innerHTML = html;

            //         el.querySelector('.assignment-content').style.maxHeight = null;
            //     }
            // });

            item.classList.toggle('active');
            if (item.classList.contains('active')) {
                content.style.maxHeight = content.scrollHeight + "px";
            } else {
                content.style.maxHeight = null;
            }
        }

        // Кнопка "Назад"
        function goBack() {
            if (currentView === 'discipline') {
                openModule(currentModuleId);
            } else if (currentView === 'module') {
                renderHome();
            }
        }

        function updateNav(title) {
            breadcrumb.textContent = title;
            if (currentView === 'home') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
